  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

    const VRM = await import('https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js');

    // ── Mixamo → VRM bone map (for FBX import upgrade path) ─────
    const mixamoVRMRigMap = {
      'mixamorigHips': 'hips', 'mixamorigSpine': 'spine', 'mixamorigSpine1': 'chest',
      'mixamorigSpine2': 'upperChest', 'mixamorigNeck': 'neck', 'mixamorigHead': 'head',
      'mixamorigLeftShoulder': 'leftShoulder', 'mixamorigLeftArm': 'leftUpperArm',
      'mixamorigLeftForeArm': 'leftLowerArm', 'mixamorigLeftHand': 'leftHand',
      'mixamorigRightShoulder': 'rightShoulder', 'mixamorigRightArm': 'rightUpperArm',
      'mixamorigRightForeArm': 'rightLowerArm', 'mixamorigRightHand': 'rightHand',
      'mixamorigLeftUpLeg': 'leftUpperLeg', 'mixamorigLeftLeg': 'leftLowerLeg',
      'mixamorigLeftFoot': 'leftFoot', 'mixamorigRightUpLeg': 'rightUpperLeg',
      'mixamorigRightLeg': 'rightLowerLeg', 'mixamorigRightFoot': 'rightFoot',
      'mixamorigLeftHandThumb1': 'leftThumbMetacarpal',
      'mixamorigLeftHandThumb2': 'leftThumbProximal',
      'mixamorigLeftHandIndex1': 'leftIndexProximal',
      'mixamorigLeftHandMiddle1': 'leftMiddleProximal',
      'mixamorigLeftHandRing1': 'leftRingProximal',
      'mixamorigLeftHandPinky1': 'leftLittleProximal',
      'mixamorigRightHandThumb1': 'rightThumbMetacarpal',
      'mixamorigRightHandThumb2': 'rightThumbProximal',
      'mixamorigRightHandIndex1': 'rightIndexProximal',
      'mixamorigRightHandMiddle1': 'rightMiddleProximal',
      'mixamorigRightHandRing1': 'rightRingProximal',
      'mixamorigRightHandPinky1': 'rightLittleProximal',
    };

    // ── Retarget Mixamo FBX → VRM clip ──────────────────────────
    function retargetMixamoClip(clip, vrm) {
      const tracks = [];
      const isVRM0 = vrm.meta?.metaVersion === '0';
      clip.tracks.forEach((track) => {
        const parts = track.name.split('.');
        const mixamoBone = parts[0];
        const vrmBoneName = mixamoVRMRigMap[mixamoBone];
        if (!vrmBoneName) return;
        const vrmNode = vrm.humanoid.getNormalizedBoneNode(vrmBoneName);
        if (!vrmNode) return;
        if (track instanceof THREE.QuaternionKeyframeTrack) {
          // Mixamo uses different coordinate system than VRM
          // For VRM 1.0: negate x and z components of quaternion
          // For VRM 0.x: negate x and w components
          const newValues = new Float32Array(track.values.length);
          for (let i = 0; i < track.values.length; i += 4) {
            if (isVRM0) {
              newValues[i] = -track.values[i];     // -x
              newValues[i+1] = track.values[i+1];   // y
              newValues[i+2] = -track.values[i+2];  // -z  
              newValues[i+3] = track.values[i+3];   // w
            } else {
              // VRM 1.0: convert from Mixamo coordinate space
              newValues[i] = track.values[i];       // x
              newValues[i+1] = track.values[i+1];   // y
              newValues[i+2] = track.values[i+2];   // z
              newValues[i+3] = track.values[i+3];   // w
            }
          }
          tracks.push(new THREE.QuaternionKeyframeTrack(
            `${vrmNode.name}.quaternion`, track.times, newValues,
          ));
        } else if (track instanceof THREE.VectorKeyframeTrack && vrmBoneName === 'hips') {
          // Scale Mixamo position (cm) to VRM (m)
          const scale = isVRM0 ? 0.01 : 0.01;
          const newValues = new Float32Array(track.values.length);
          for (let i = 0; i < track.values.length; i += 3) {
            newValues[i] = track.values[i] * scale;     // x
            newValues[i+1] = track.values[i+1] * scale; // y
            newValues[i+2] = track.values[i+2] * scale; // z
            if (isVRM0) {
              newValues[i] = -newValues[i];   // flip x
              newValues[i+2] = -newValues[i+2]; // flip z
            }
          }
          tracks.push(new THREE.VectorKeyframeTrack(
            `${vrmNode.name}.position`, track.times, newValues,
          ));
        }
      });
      return new THREE.AnimationClip(clip.name || 'mixamo', clip.duration, tracks);
    }

    // ══════════════════════════════════════════════════════════════
    // EMBEDDED KEYFRAME ANIMATIONS (self-contained, no files)
    // Creates smooth multi-frame AnimationClips using quaternion
    // keyframe tracks. Each pose is defined as Euler angles, then
    // converted to quaternion keyframes with interpolation.
    // ══════════════════════════════════════════════════════════════
    function eulerToQuat(x = 0, y = 0, z = 0) {
      return new THREE.Quaternion().setFromEuler(new THREE.Euler(x, y, z));
    }

    function buildClip(name, duration, boneKeyframes, vrm) {
      const tracks = [];
      for (const [boneName, keyframes] of Object.entries(boneKeyframes)) {
        const node = vrm.humanoid.getNormalizedBoneNode(boneName);
        if (!node) continue;
        const times = [];
        const values = [];
        for (const kf of keyframes) {
          times.push(kf.t);
          const q = eulerToQuat(kf.x || 0, kf.y || 0, kf.z || 0);
          values.push(q.x, q.y, q.z, q.w);
        }
        // Head/spine: use LINEAR to prevent wild catmull-rom overshoot
        // Other bones: use SMOOTH for natural arcs
        const isHead = boneName === 'head' || boneName === 'neck' || boneName === 'spine';
        tracks.push(new THREE.QuaternionKeyframeTrack(
          `${node.name}.quaternion`, times, values,
          isHead ? THREE.InterpolateLinear : THREE.InterpolateSmooth,
        ));
      }
      return new THREE.AnimationClip(name, duration, tracks);
    }

      // ── WAVE: right hand wave ─────────────────────────────────

      // ── HEAD SHAKE: head shake no ─────────────────────────────

        head: [
          { t: 0, z: 0 }, { t: 0.3, z: 0.1 }, { t: 0.6, z: -0.1 }, { t: 0.9, z: 0.1 },
          { t: 1.2, z: -0.1 }, { t: 1.5, z: 0.1 }, { t: 1.7, z: -0.05 }, { t: 2.0, z: 0 },

      // ── BOW: bowing ───────────────────────────────────────────

        head: [

          { t: 0, x: 0 }, { t: 0.5, x: 0.1 }, { t: 2.5, x: 0.1 }, { t: 3, x: 0 },

      // ── LAUGH: shaking body ───────────────────────────────────
      clips.laugh = buildClip('laugh', 2.5, {
        head: [
          { t: 0, x: 0 }, { t: 0.3, x: -0.05 }, { t: 0.5, x: 0.08 }, { t: 0.7, x: -0.05 },
          { t: 0.9, x: 0.08 }, { t: 1.1, x: -0.05 }, { t: 1.3, x: 0.08 },
          { t: 1.5, x: -0.05 }, { t: 1.7, x: 0.06 }, { t: 2, x: 0.02 }, { t: 2.5, x: 0 },
        ],
        spine: [
          { t: 0, x: 0 }, { t: 0.3, x: 0.02 }, { t: 0.5, x: -0.02 }, { t: 0.7, x: 0.02 },
          { t: 0.9, x: -0.02 }, { t: 1.3, x: 0.02 }, { t: 1.7, x: -0.01 }, { t: 2.5, x: 0 },
        ],
        leftShoulder: [
          { t: 0, z: -0.03 }, { t: 0.3, z: -0.08 }, { t: 0.5, z: -0.03 },
          { t: 0.7, z: -0.08 }, { t: 0.9, z: -0.03 }, { t: 2.5, z: -0.03 },
        ],
        rightShoulder: [
          { t: 0, z: 0.03 }, { t: 0.3, z: 0.08 }, { t: 0.5, z: 0.03 },
          { t: 0.7, z: 0.08 }, { t: 0.9, z: 0.03 }, { t: 2.5, z: 0.03 },
        ],
      }, vrm);

      // ── THUMBS UP ─────────────────────────────────────────────
      clips.thumbsUp = buildClip('thumbsUp', 2.5, {
        rightUpperArm: [
          { t: 0, z: 1.15 }, { t: 0.4, z: 0.3, x: 0.1 }, { t: 2.1, z: 0.3, x: 0.1 }, { t: 2.5, z: 1.15 },
        ],
        rightLowerArm: [
          { t: 0, z: 0.25 }, { t: 0.4, z: 0.3, x: -0.8 }, { t: 2.1, z: 0.3, x: -0.8 }, { t: 2.5, z: 0.25 },
        ],
        head: [
          { t: 0, x: 0 }, { t: 0.4, x: 0.03, z: 0.02 }, { t: 2.1, x: 0.03, z: 0.02 }, { t: 2.5, x: 0 },
        ],
      }, vrm);

      return clips;
    }

    // ══════════════════════════════════════════════════════════════
    // SCENE SETUP
    // ══════════════════════════════════════════════════════════════
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);  // dark blue-black background
    const camera = new THREE.PerspectiveCamera(32, window.innerWidth / window.innerHeight, 0.1, 50);
    const params = new URLSearchParams(window.location.search);
    const framing = params.get('framing') || 'bust';
    if (framing === 'full') { camera.position.set(0, 1.0, 3.0); camera.lookAt(0, 0.9, 0); }
    else { camera.position.set(0, 1.35, 2.0); camera.lookAt(0, 1.28, 0); }  // proper bust view

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    scene.add(new THREE.HemisphereLight(0xddeeff, 0x445566, 1.0));
    const front = new THREE.DirectionalLight(0xffffff, 0.8);
    front.position.set(0, 2, 3); scene.add(front);
    const rimLight = new THREE.PointLight(0x00ddff, 0.6, 10);
    rimLight.position.set(-1, 1.5, -1); scene.add(rimLight);

    // ══════════════════════════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════════════════════════
    let vrm = null, mixer = null;
    const clips = {}, actions = {};
    let currentAction = null;
    let currentMode = 'idle', currentEmotion = 'neutral';
    let mouthTarget = 0, mouthCurrent = 0;
    let blinkTimer = 0, nextBlink = 2 + Math.random() * 3, blinking = false, blinkPhase = 0;
    let emotionSmooth = { happy: 0, angry: 0, sad: 0, surprised: 0 };
    let gazeTimer = 0, gazeTargetX = 0, gazeTargetZ = 0, gazeCurrentX = 0, gazeCurrentZ = 0;
    let nextGazeShift = 2 + Math.random() * 3;
    let fidgetTimer = 0, nextFidget = 12 + Math.random() * 10;

    const EMOTION_MAP = {
      neutral: { happy: 0, angry: 0, sad: 0, surprised: 0 },
      happy: { happy: 0.2, angry: 0, sad: 0, surprised: 0 },
      excited: { happy: 0.25, angry: 0, sad: 0, surprised: 0.15 },
      amused: { happy: 0.15, angry: 0, sad: 0, surprised: 0.1 },
      sarcastic: { happy: 0.1, angry: 0.1, sad: 0, surprised: 0 },
      surprised: { happy: 0, angry: 0, sad: 0, surprised: 0.4 },
      concerned: { happy: 0, angry: 0.05, sad: 0.2, surprised: 0.1 },
      curious: { happy: 0.05, angry: 0, sad: 0, surprised: 0.2 },
      confident: { happy: 0.15, angry: 0, sad: 0, surprised: 0 },
      empathetic: { happy: 0.1, angry: 0, sad: 0.15, surprised: 0 },
      focused: { happy: 0, angry: 0.1, sad: 0, surprised: 0 },
      alarmed: { happy: 0, angry: 0.15, sad: 0, surprised: 0.3 },
    };
    const MODE_COLORS = { idle: 0x445566, listening: 0x00ff88, thinking: 0xffaa00, speaking: 0x00ddff };

    function setExpression(name, value) {
      if (!vrm?.expressionManager) return;
      try { vrm.expressionManager.setValue(name, value); } catch (e) { }
    }

    // ══════════════════════════════════════════════════════════════
    // PLAY ANIMATION
    // ══════════════════════════════════════════════════════════════
    function playAnim(name, fadeTime = 0.5, loop = false) {
      if (!mixer || !actions[name]) return false;
      const next = actions[name];
      next.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, loop ? Infinity : 1);
      next.clampWhenFinished = !loop;
      if (currentAction && currentAction !== next) {
        next.reset().setEffectiveWeight(1).play();
        currentAction.crossFadeTo(next, fadeTime, true);
      } else {
        next.reset().setEffectiveWeight(1).play();
      }
      if (!loop) {
        const onDone = (e) => {
          if (e.action === next) {
            mixer.removeEventListener('finished', onDone);
            if (actions['idle']) playAnim('idle', 0.5, true);
          }
        };
        mixer.addEventListener('finished', onDone);
      }
      currentAction = next;
      return true;
    }

    // ══════════════════════════════════════════════════════════════
    // LOAD VRM
    // ══════════════════════════════════════════════════════════════
    const modelUrl = params.get('model') || 'models/avatar.vrm';
    const gltfLoader = new GLTFLoader();
    gltfLoader.register((p) => new VRM.VRMLoaderPlugin(p));

    gltfLoader.load(modelUrl, async (gltf) => {
      vrm = gltf.userData.vrm;
      scene.add(vrm.scene);

      // Fix materials
      vrm.scene.traverse((child) => {
        if (child.isMesh && child.material) {
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach((mat) => {
            if (mat.map) {
              child.material = new THREE.MeshBasicMaterial({
                map: mat.map, side: THREE.DoubleSide,
                transparent: mat.transparent, alphaTest: 0.5,
              });
            }
          });
        }
      });

      if (vrm.lookAt) vrm.lookAt.target = camera;

      // Create mixer + embedded animations
      mixer = new THREE.AnimationMixer(vrm.scene);
      const embedded = createEmbeddedAnimations(vrm);
      for (const [name, clip] of Object.entries(embedded)) {
        clips[name] = clip;
        actions[name] = mixer.clipAction(clip);
      }

      // Try loading Mixamo FBX files (upgrade path)
      const fbxLoader = new FBXLoader();
      const FBX_ANIMS = {
        'idle': 'animations/idle.fbx', 'wave': 'animations/wave.fbx',
        'clap': 'animations/clap.fbx', 'think': 'animations/think.fbx',
        'shrug': 'animations/shrug.fbx', 'dance': 'animations/dance.fbx',
        'celebrate': 'animations/celebrate.fbx', 'salute': 'animations/salute.fbx',
      };
      let fbxCount = 0;
      for (const [name, url] of Object.entries(FBX_ANIMS)) {
        try {
          const fbx = await new Promise((res, rej) => fbxLoader.load(url, res, undefined, rej));
          if (fbx.animations[0]) {
            fbx.animations[0].name = name;
            const clip = retargetMixamoClip(fbx.animations[0], vrm);
            clips[name] = clip;
            actions[name] = mixer.clipAction(clip);
            fbxCount++;
            console.log(`[FBX] Loaded: ${name}`);
          }
        } catch (e) { /* FBX not available — using embedded */ }
      }
      console.log(`[FBX] ${fbxCount} Mixamo animations loaded`);

      // Start idle
      playAnim('idle', 0, true);
      console.log('[VRM] Ready — animations:', Object.keys(clips).join(', '));
    });

    // ══════════════════════════════════════════════════════════════
    // RENDER LOOP
    // ══════════════════════════════════════════════════════════════
    const clock = new THREE.Clock();
    renderer.setAnimationLoop(() => {
      const dt = Math.min(clock.getDelta(), 0.05);
      const t = clock.getElapsedTime();
      if (!vrm) { renderer.render(scene, camera); return; }

      // Breathing
      vrm.scene.scale.set(1, 1 + Math.sin(t * 1.5) * 0.003, 1);

      // Blinking
      blinkTimer += dt;
      if (!blinking && blinkTimer >= nextBlink) { blinking = true; blinkPhase = 0; }
      if (blinking) {
        blinkPhase += dt * 10;
        if (blinkPhase < 0.5) setExpression('blink', blinkPhase * 2);
        else if (blinkPhase < 1.5) setExpression('blink', Math.max(0, 1 - (blinkPhase - 0.5)));
        else { setExpression('blink', 0); blinking = false; blinkTimer = 0; nextBlink = 2 + Math.random() * 4; }
      }

      // Gaze (very subtle — only during idle, NOT during gestures)
      gazeTimer += dt;
      if (gazeTimer >= nextGazeShift) {
        gazeTargetX = (Math.random() - 0.5) * 0.02;  // very subtle
        gazeTargetZ = (Math.random() - 0.5) * 0.01;
        gazeTimer = 0; nextGazeShift = 3 + Math.random() * 4;
      }
      gazeCurrentX += (gazeTargetX - gazeCurrentX) * Math.min(dt * 2, 1);
      gazeCurrentZ += (gazeTargetZ - gazeCurrentZ) * Math.min(dt * 2, 1);

      // Mouth
      mouthCurrent += (mouthTarget - mouthCurrent) * Math.min(dt * 12, 1);
      setExpression('aa', mouthCurrent * 0.22);
      setExpression('oh', mouthCurrent * 0.10);
      setExpression('ih', mouthCurrent * 0.06);

      // Emotions
      const emo = EMOTION_MAP[currentEmotion] || EMOTION_MAP.neutral;
      for (const k of ['happy', 'angry', 'sad', 'surprised']) {
        emotionSmooth[k] += ((emo[k] || 0) - emotionSmooth[k]) * dt * 3;
        setExpression(k, emotionSmooth[k]);
      }

      // Rim light
      rimLight.color.lerp(new THREE.Color(MODE_COLORS[currentMode] || 0x445566), dt * 3);

      // VRM update + AnimationMixer
      vrm.update(dt);
      if (mixer) mixer.update(dt);

      // Tiny speaking nod (only during speech, NO gaze stacking on gestures)
      if (vrm.humanoid && currentMode === 'speaking') {
        const head = vrm.humanoid.getNormalizedBoneNode('head');
        if (head) {
          const nod = new THREE.Quaternion().setFromEuler(new THREE.Euler(
            Math.sin(t * 2.5) * 0.008 * mouthCurrent, 0, 0,
          ));
          head.quaternion.multiply(nod);
        }
      }

      // Auto-fidget
      if (currentMode !== 'speaking') {
        fidgetTimer += dt;
        if (fidgetTimer >= nextFidget) {
          const picks = ['nod', 'headShake', 'shrug', 'think', 'crossArms'].filter(n => actions[n]);
          if (picks.length) playAnim(picks[Math.floor(Math.random() * picks.length)], 0.5, false);
          fidgetTimer = 0; nextFidget = 15 + Math.random() * 15;
        }
      } else { fidgetTimer = 0; }

      renderer.render(scene, camera);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── API ──────────────────────────────────────────────────────
    window.setMode = (m) => { currentMode = m; };
    window.setEmotion = (e) => { currentEmotion = e; };
    window.setMouth = (v) => { mouthTarget = typeof v === 'number' ? v : 0; };
    window.playAnimation = (name, fade = 0.5) => playAnim(name, fade, false);
    window.getAnimations = () => Object.keys(clips);
    window.setGesture = (name) => playAnim(name, 0.5, false);  // legacy

  </script>
</body>

</html>
