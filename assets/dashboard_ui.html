<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMC Overwatch — Control Panel</title>
    <style>
        :root {
            --bg: #0a0e17;
            --surface: #131a2b;
            --border: #1e2a42;
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --text: #e2e8f0;
            --muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'SF Pro Display', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--surface), #0d1424);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .header .status-badge {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.85rem; color: var(--green);
        }
        .header .status-badge .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--green); animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
            padding: 1.5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.2rem;
            transition: border-color 0.3s;
        }
        .card:hover { border-color: var(--accent); }

        .card h2 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 0.8rem;
        }

        .stat-row {
            display: flex; justify-content: space-between;
            align-items: center; padding: 0.4rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { color: var(--muted); font-size: 0.85rem; }
        .stat-value {
            font-weight: 600; font-size: 0.95rem;
            font-variant-numeric: tabular-nums;
        }

        .mode-idle { color: var(--muted); }
        .mode-listening { color: var(--accent); }
        .mode-thinking { color: var(--yellow); }
        .mode-speaking { color: var(--green); }

        .amplitude-bar {
            width: 100%; height: 6px; background: rgba(255,255,255,0.06);
            border-radius: 3px; overflow: hidden;
        }
        .amplitude-fill {
            height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width 0.05s; width: 0%;
            border-radius: 3px;
        }

        .log-container {
            grid-column: 1 / -1;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Menlo', monospace;
            font-size: 0.78rem;
            line-height: 1.6;
            color: var(--muted);
        }
        .log-container .log-entry { padding: 2px 0; }
        .log-container .log-user { color: var(--accent); }
        .log-container .log-ai { color: var(--green); }
        .log-container .log-system { color: var(--yellow); }

        .btn {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff; border: none; padding: 0.5rem 1.2rem;
            border-radius: 8px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.97); }
        .btn-danger {
            background: linear-gradient(135deg, var(--red), #b91c1c);
        }
        .btn-row { display: flex; gap: 0.6rem; margin-top: 0.5rem; }

        .subtitle-box {
            grid-column: 1 / -1;
            text-align: center; font-size: 1.1rem;
            padding: 1rem; min-height: 3rem;
            color: var(--text); font-style: italic;
            opacity: 0.8;
        }

        .emotion-badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ PMC Overwatch</h1>
        <div class="status-badge">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Connecting...</span>
        </div>
    </div>

    <div class="grid">
        <!-- Status Card -->
        <div class="card">
            <h2>System Status</h2>
            <div class="stat-row">
                <span class="stat-label">Mode</span>
                <span class="stat-value" id="modeValue">—</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Emotion</span>
                <span id="emotionValue" class="emotion-badge">neutral</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Amplitude</span>
                <div class="amplitude-bar"><div class="amplitude-fill" id="ampBar"></div></div>
            </div>
            <div class="stat-row">
                <span class="stat-label">Uptime</span>
                <span class="stat-value" id="uptimeValue">—</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Clients</span>
                <span class="stat-value" id="clientsValue">0</span>
            </div>
        </div>

        <!-- Controls Card -->
        <div class="card">
            <h2>Controls</h2>
            <div class="btn-row">
                <button class="btn" onclick="clearMemory()">🧹 Clear Memory</button>
                <button class="btn" onclick="triggerAnim('dance')">💃 Dance</button>
                <button class="btn" onclick="triggerAnim('wave')">👋 Wave</button>
            </div>
            <div class="btn-row" style="margin-top: 0.6rem;">
                <button class="btn" onclick="navigate('left')">⬅ Left</button>
                <button class="btn" onclick="navigate('center')">⏺ Center</button>
                <button class="btn" onclick="navigate('right')">➡ Right</button>
            </div>
            <div class="btn-row" style="margin-top: 0.6rem;">
                <button class="btn" onclick="triggerAnim('celebrate')">🎉 Celebrate</button>
                <button class="btn" onclick="triggerAnim('salute')">🫡 Salute</button>
                <button class="btn btn-danger" onclick="triggerAnim('die')">💀 Die</button>
            </div>
        </div>

        <!-- Subtitle -->
        <div class="card subtitle-box" id="subtitleBox">
            Waiting for speech...
        </div>

        <!-- Conversation Log -->
        <div class="card" style="grid-column: 1 / -1;">
            <h2>Conversation Log</h2>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        const WS_URL = `ws://${location.host}/ws/mascot`;
        const API = `http://${location.host}`;
        let ws = null;
        let reconnectTimer = null;

        function connect() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => {
                document.getElementById('statusText').textContent = 'Connected';
                document.getElementById('statusDot').style.background = 'var(--green)';
                addLog('system', 'Connected to PMC Overwatch');
                fetchStatus();
            };
            ws.onclose = () => {
                document.getElementById('statusText').textContent = 'Disconnected';
                document.getElementById('statusDot').style.background = 'var(--red)';
                reconnectTimer = setTimeout(connect, 3000);
            };
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                handleMessage(msg);
            };
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'mode':
                    const el = document.getElementById('modeValue');
                    el.textContent = msg.value.toUpperCase();
                    el.className = `stat-value mode-${msg.value}`;
                    break;
                case 'amplitude':
                    document.getElementById('ampBar').style.width = `${msg.value * 100}%`;
                    break;
                case 'emotion':
                    document.getElementById('emotionValue').textContent = msg.value;
                    break;
                case 'subtitle':
                    document.getElementById('subtitleBox').textContent = msg.value || 'Waiting for speech...';
                    if (msg.value) addLog('ai', msg.value);
                    break;
                case 'chat':
                    addLog('user', `[${msg.value.user}] ${msg.value.message}`);
                    break;
            }
        }

        function addLog(type, text) {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${text}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            // Keep last 100 entries
            while (container.children.length > 100) container.removeChild(container.firstChild);
        }

        async function fetchStatus() {
            try {
                const res = await fetch(`${API}/api/status`);
                const data = await res.json();
                document.getElementById('uptimeValue').textContent = data.uptime_human || '—';
                document.getElementById('clientsValue').textContent = data.mascot_clients || 0;
            } catch (e) {}
            setTimeout(fetchStatus, 5000);
        }

        async function clearMemory() {
            try {
                await fetch(`${API}/api/clear-memory`, { method: 'POST' });
                addLog('system', 'Memory cleared');
            } catch (e) { addLog('system', 'Failed to clear memory'); }
        }

        function triggerAnim(name) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'animation', value: name }));
                addLog('system', `Triggered: ${name}`);
            }
        }

        function navigate(dir) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'navigate', value: dir }));
            }
        }

        connect();
    </script>
</body>
</html>
